<!-- Options Recos Section -->
<div style="width: 100%; text-align: center; margin: 20px 0 10px 0;">
    <button onclick="openLatestReco()" style="
        background-color: #22c55e;
        color: white;
        font-size: 2em;
        font-weight: bold;
        padding: 24px 60px;
        border: none;
        border-radius: 16px;
        cursor: pointer;
        box-shadow: 0 6px 18px rgba(0,0,0,0.25);
        letter-spacing: 2px;
        transition: background-color 0.2s, transform 0.1s;
    "
    onmouseover="this.style.backgroundColor='#16a34a'"
    onmouseout="this.style.backgroundColor='#22c55e'"
    onmousedown="this.style.transform='scale(0.97)'"
    onmouseup="this.style.transform='scale(1)'">
        📄 ChampWinJim's Latest Top Notch Big Options Recos
    </button>
</div>

<div style="width: 100%; text-align: center; margin: 0 0 40px 0;">
    <details style="display: inline-block; width: 100%;">
        <summary style="
            cursor: pointer;
            background-color: #1e3a5f;
            color: #90cdf4;
            font-size: 1.4em;
            padding: 10px 32px;
            border-radius: 10px;
            font-weight: bold;
            list-style: none;
            user-select: none;
        ">📂 ChampWinJim's Historic Top Notch Big Options Recos ▾</summary>
        <div id="historic-list" style="
            background: #f0f7ff;
            border: 2px solid #1e3a5f;
            border-radius: 10px;
            padding: 12px 24px;
            margin-top: 6px;
            font-size: 1.15em;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
        ">
            <em style="color:#888">Loading...</em>
        </div>
    </details>
</div>

<script>
    let recosData = null;

    async function loadRecos() {
        if (recosData) return recosData;
        const response = await fetch('OptionsRecos/Big_Options_Recos.json');
        if (!response.ok) throw new Error('Could not load recos.json (status ' + response.status + ')');
        recosData = await response.json();
        return recosData;
    }

    async function openLatestReco() {
        try {
            const data = await loadRecos();
            if (!data.recos || !data.recos.length) throw new Error('No recos found in recos.json');
            window.open('OptionsRecos/' + data.recos[0], '_blank');
        } catch (err) {
            alert('Error opening latest reco: ' + err.message);
        }
    }

    // Populate historic list when dropdown opens
    document.querySelector('details').addEventListener('toggle', async function() {
        if (!this.open) return;
        const container = document.getElementById('historic-list');
        try {
            const data = await loadRecos();
            const historic = data.recos.slice(1); // everything after the latest
            if (!historic.length) {
                container.innerHTML = '<em style="color:#888">No historic recos yet.</em>';
                return;
            }
            container.innerHTML = historic.map(pdf =>
                `<div style="margin: 6px 0;">
                    <a href="OptionsRecos/${pdf}" target="_blank"
                       style="color: #1e3a5f; font-weight: bold; text-decoration: none;">
                        📄 ${pdf}
                    </a>
                </div>`
            ).join('');
        } catch (err) {
            container.innerHTML = '<em style="color:red">Error loading history: ' + err.message + '</em>';
        }
    });
</script>
